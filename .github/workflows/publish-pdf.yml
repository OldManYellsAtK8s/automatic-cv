name: Generate and publish PDF

on:
  push:
    paths:
      - docs/DISCOVERY.md
      - docs/images/**
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    env:
      DEST_REPO: oldmanyellsatk8s/tricloud-www
      DEST_BRANCH: develop
      DEST_PATH: docs/
      DEST_FILE: DISCOVERY.pdf
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Prepare output directory
        run: mkdir -p pdfs
  converttopdf:
    name: Build PDF
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: baileyjm02/markdown-to-pdf@v1
        with:
          input_dir: docs
          output_dir: pdfs
          images_dir: docs/images
          image_import: ./images
          build_html: false

      - name: Checkout destination repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.DEST_REPO }}
          ref: ${{ env.DEST_BRANCH }}
          token: ${{ secrets.DEST_REPO_TOKEN }}
          path: dest-repo

      - name: Copy PDF into destination repo
        run: |
          mkdir -p "dest-repo/${DEST_PATH}"
          cp "pdfs/DISCOVERY.pdf" "dest-repo/${DEST_PATH}/${DEST_FILE}"

      - name: Commit and push if changed
        run: |
          cd dest-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git status --porcelain | grep -q .; then
            git add "${DEST_PATH}/${DEST_FILE}"
            git commit -m "Update discovery PDF"
            git push
          else
            echo "No changes to commit."
          fi
